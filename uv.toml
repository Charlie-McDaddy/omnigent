# Dependency cooldown: never resolve a distribution uploaded within the
# last 7 days, so a compromised or yanked release has a window to surface
# before it gets pinned. This is a static cutoff for compatibility with uv
# versions that require an RFC 3339 timestamp; bump it periodically to keep
# the intended 7-day cooldown.
exclude-newer = "2026-07-09T04:06:03Z"
